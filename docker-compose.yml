version: '3.8'

services:
  # PHP FPM Backend
  php-fpm:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: laravel-app
    working_dir: /app
    environment:
      APP_NAME: "Laravel12Vue3"
      APP_ENV: local
      APP_DEBUG: "true"
      APP_URL: http://localhost:8000
      DB_CONNECTION: sqlite
      DB_DATABASE: /app/database/database.sqlite
      JWT_SECRET: test1234567890test1234567890test1234567890
      JWT_ALGORITHM: HS256
      JWT_TTL: 60
      JWT_REFRESH_TTL: 20160
      VITE_API_URL: http://localhost:8000/api
    volumes:
      - ./:/app
      - /app/node_modules
    networks:
      - app-network
    depends_on:
      - database

  # Nginx for Backend
  nginx-backend:
    image: nginx:alpine
    container_name: nginx-backend
    ports:
      - "8000:80"
    volumes:
      - ./:/app
      - ./docker/nginx-backend.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - php-fpm
    networks:
      - app-network

  # Frontend - Build & Serve
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: vue-app
    ports:
      - "5173:80"
    networks:
      - app-network
    environment:
      VITE_API_URL: http://localhost:8000/api

  # SQLite Database (just for volume persistence)
  database:
    image: alpine:latest
    container_name: database-storage
    volumes:
      - ./database/database.sqlite:/app/database/database.sqlite
      - database-volume:/data
    command: tail -f /dev/null
    networks:
      - app-network

volumes:
  database-volume:

networks:
  app-network:
    driver: bridge
